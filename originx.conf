server {
    listen 80;
    server_name originapex.cn www.originapex.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name originapex.cn www.originapex.cn;

    ssl_certificate /etc/letsencrypt/live/originapex.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/originapex.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/originx/frontend;
    index index.html;

    # Frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://localhost:3006/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend uploads/static files
    location /uploads/ {
        alias /var/www/originx/backend/public/uploads/;
        autoindex off;
    }
}
